# ============================================================
# prj.conf — NETWORK CORE (nrf5340dk_nrf5340_cpunet)
# NCS v2.5.1
# ============================================================

# --- Kernel ---
CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_IDLE_STACK_SIZE=1024
CONFIG_ISR_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=4096

# --- Safety ---
CONFIG_STACK_SENTINEL=y
CONFIG_THREAD_NAME=y
CONFIG_HW_STACK_PROTECTION=y

# --- Console / Logging via RTT (net core has no UART) ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y

# --- GPIO (for LED blink confirmation) ---
CONFIG_GPIO=y

# --- Bluetooth core ---
CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="DataLogger3"
CONFIG_BT_ID_MAX=2

# --- BLE Roles ---
CONFIG_BT_OBSERVER=y
CONFIG_BT_SCAN=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_PER_ADV=n
CONFIG_BT_PERIPHERAL=n
CONFIG_BT_CENTRAL=n

# --- BLE Controller ---
CONFIG_BT_CTLR_ADV_EXT=y
CONFIG_BT_CTLR_ADV_DATA_LEN_MAX=256
CONFIG_BT_CTLR_SCAN_DATA_LEN_MAX=256
CONFIG_BT_CTLR_RX_BUFFERS=16
CONFIG_BT_BUF_EVT_RX_COUNT=20
CONFIG_BT_EXT_SCAN_BUF_SIZE=1650
CONFIG_BT_CTLR_FAL_SIZE=8
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_BT_FILTER_ACCEPT_LIST=y

# --- IPC (OpenAMP / RPMsg) ---
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_RPMSG=y
CONFIG_MBOX=y
CONFIG_OPENAMP=y

# --- Misc ---
CONFIG_ENTROPY_GENERATOR=y